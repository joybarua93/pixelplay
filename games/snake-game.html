<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake — PixelPlay</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🐍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Lilita One', cursive;
      background: #0f1f2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      user-select: none;
    }

    /* ── pp-back pill ── */
    #pp-back {
      position: fixed !important;
      top: 14px !important;
      left: 14px !important;
      z-index: 2147483647 !important;
      display: flex;
      align-items: center !important;
      gap: 6px !important;
      padding: 8px 16px 8px 12px !important;
      background: #2A3660 !important;
      color: #ffffff !important;
      font-family: 'Lilita One', Arial, sans-serif !important;
      font-size: 15px !important;
      text-decoration: none !important;
      border-radius: 50px !important;
      border: 2px solid rgba(255,255,255,0.25) !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4), 3px 3px 0 #1D284A !important;
      letter-spacing: 0.3px !important;
      -webkit-tap-highlight-color: transparent !important;
      pointer-events: all !important;
    }
    #pp-back::before { content: '←' !important; font-size: 16px !important; }
    #pp-back:hover  { background: #38AAEE !important; }
    #pp-back:active { transform: translate(2px,2px) !important; }

    /* ── Start Screen ── */
    #start-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100dvh; gap: 22px; padding: 24px;
      background: linear-gradient(160deg, #0c1520 0%, #0f1f2e 100%);
    }
    .start-emoji {
      font-size: 80px;
      filter: drop-shadow(0 0 20px rgba(61,224,112,0.5));
      animation: slither 3s ease-in-out infinite;
    }
    @keyframes slither {
      0%   { transform: rotate(-5deg) scaleX(1); }
      25%  { transform: rotate(0deg)  scaleX(1.05); }
      50%  { transform: rotate(5deg)  scaleX(1); }
      75%  { transform: rotate(0deg)  scaleX(1.05); }
      100% { transform: rotate(-5deg) scaleX(1); }
    }
    .start-title { font-size: clamp(32px,7vw,44px); text-shadow: 0 0 20px rgba(61,196,106,0.6); }
    .start-sub   { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; color:rgba(255,255,255,0.4); }
    .select-group { display:flex; flex-direction:column; gap:10px; width:100%; max-width:340px; }
    .section-label { font-family:'Press Start 2P',monospace; font-size:8px; color:rgba(255,255,255,0.35); letter-spacing:0.1em; }
    .toggle-group  { display:flex; gap:10px; flex-wrap:wrap; }
    .toggle-btn {
      font-family:'Lilita One',cursive; font-size:15px; padding:10px 22px;
      border-radius:10px; border:2px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.5);
      cursor:pointer; transition:all 0.15s; min-height:44px;
    }
    .toggle-btn.active {
      background:#3DC46A; border-color:#2A3660; color:#1D284A;
      box-shadow:3px 3px 0 rgba(0,0,0,0.4);
    }
    #play-btn {
      font-family:'Lilita One',cursive; font-size:22px; padding:14px 60px;
      background:#3DC46A; color:#1D284A; border:3px solid #1D284A;
      border-radius:14px; box-shadow:4px 4px 0 #1D284A; cursor:pointer;
      margin-top:6px; transition:transform 0.1s, box-shadow 0.1s;
    }
    #play-btn:hover  { transform:translate(-1px,-1px); box-shadow:5px 5px 0 #1D284A; }
    #play-btn:active { transform:translate(2px,2px);  box-shadow:2px 2px 0 #1D284A; }

    /* ── Game Screen ── */
    #game-screen { display:none; flex-direction:column; height:100dvh; }

    .top-bar {
      background:#2A3660; height:48px;
      display:flex; align-items:center; justify-content:center;
      padding:0 16px; flex-shrink:0; position:relative;
    }
    .top-title  { color:#fff; font-size:16px; }
    .game-area {
      flex:1; display:flex; align-items:center; justify-content:center;
      background:#0f1f2e; overflow:hidden; position:relative;
    }
    canvas { display:block; touch-action:none; }
    .bottom-bar {
      background:#fff; height:52px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; border-top:3px solid #2A3660; flex-shrink:0;
    }
    .bottom-score { font-family:'Lilita One',cursive; color:#2A3660; font-size:14px; }
    .btn-bottom {
      font-family:'Lilita One',cursive; font-size:14px; padding:6px 16px;
      border-radius:8px; cursor:pointer; min-height:36px;
      border:2px solid #2A3660; box-shadow:3px 3px 0 #1D284A;
      transition:transform 0.1s, box-shadow 0.1s;
      text-decoration:none; display:inline-flex; align-items:center;
    }
    .btn-bottom:active { transform:translate(1px,1px); box-shadow:2px 2px 0 #1D284A; }
    .btn-restart { background:#3DC46A; color:#2A3660; }
    .btn-home    { background:#2A3660; color:#fff; }

    #overlay {
      display:none; position:fixed; inset:0;
      background:rgba(14,19,34,0.9); backdrop-filter:blur(6px);
      align-items:center; justify-content:center; z-index:50;
      flex-direction:column; gap:16px; padding:24px; text-align:center;
    }
    #overlay.show { display:flex; }
    .overlay-emoji { font-size:64px; }
    .overlay-title { font-size:clamp(24px,6vw,36px); color:#3DC46A; text-shadow:0 0 20px rgba(61,196,106,0.5); }
    .overlay-score {
      font-family:'Press Start 2P',monospace; font-size:11px;
      color:rgba(255,255,255,0.5); line-height:2;
    }
    .btn-play-again {
      font-family:'Lilita One',cursive; font-size:20px; padding:12px 44px;
      background:#3DC46A; color:#1D284A; border:3px solid #1D284A;
      border-radius:12px; box-shadow:4px 4px 0 #1D284A; cursor:pointer; margin-top:4px;
    }

    /* ── D-Pad ── */
    #dpad {
      position: fixed;
      bottom: 70px;
      right: 16px;
      display: none;
      grid-template-columns: 44px 44px 44px;
      grid-template-rows: 44px 44px 44px;
      gap: 4px;
      z-index: 1000;
      opacity: 0.75;
    }
    .dpad-btn {
      background: rgba(42, 54, 96, 0.85);
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dpad-btn:active { background: rgba(61, 196, 106, 0.7); }
  </style>
</head>
<body>

<a id="pp-back" href="../index.html">PixelPlay</a>

<!-- ══ START SCREEN ══════════════════════════════════════════ -->
<div id="start-screen">
  <div class="start-emoji">🐍</div>
  <h1 class="start-title">Snake</h1>
  <p class="start-sub">Eat apples. Don't hit yourself.</p>

  <div class="select-group" id="diff-section">
    <span class="section-label">SPEED</span>
    <div class="toggle-group" id="diff-group">
      <button class="toggle-btn"        data-diff="easy">Slow</button>
      <button class="toggle-btn active" data-diff="medium">Normal</button>
      <button class="toggle-btn"        data-diff="hard">Fast</button>
    </div>
  </div>

  <button id="play-btn">▶ PLAY</button>
</div>

<!-- ══ GAME SCREEN ═══════════════════════════════════════════ -->
<div id="game-screen">
  <div class="top-bar">
    <span class="top-title">SNAKE</span>
  </div>
  <div class="game-area" id="game-area">
    <canvas id="canvas"></canvas>
  </div>
  <div class="bottom-bar">
    <span class="bottom-score" id="bottom-score">Score: 0</span>
    <button class="btn-bottom btn-restart" id="restart-btn">↺ Restart</button>
  </div>
</div>

<div id="overlay">
  <div class="overlay-emoji" id="ov-emoji">💀</div>
  <div class="overlay-title" id="ov-title">Game Over</div>
  <div class="overlay-score" id="ov-score">Score: 0<br>Best: 0</div>
  <button class="btn-play-again" id="play-again-btn">Play Again</button>
</div>

<div id="dpad">
  <div></div>
  <button class="dpad-btn" id="btn-up">▲</button>
  <div></div>
  <button class="dpad-btn" id="btn-left">◀</button>
  <div></div>
  <button class="dpad-btn" id="btn-right">▶</button>
  <div></div>
  <button class="dpad-btn" id="btn-down">▼</button>
  <div></div>
</div>

<script>
(function () {
  const GRID      = 20;
  const SPEED_MAP = { easy: 180, medium: 120, hard: 70 }; // ms per tick

  let diff = 'medium';
  let canvas, ctx, area, W, H, cellSize;
  let snake1, apple, dir1, nextDir1;
  let score, gameOver, raf, lastTick;
  let highScore;

  let touchStartX = 0, touchStartY = 0, lastSwipeTime = 0;
  const SWIPE_THRESHOLD = 30;
  const SWIPE_COOLDOWN  = 150;

  /* ── Start screen ── */
  document.querySelectorAll('#diff-group .toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#diff-group .toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      diff = btn.dataset.diff;
    });
  });

  document.getElementById('play-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', initGame);
  document.getElementById('play-again-btn').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('show');
    initGame();
  });

  function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    const gs = document.getElementById('game-screen');
    gs.style.display = 'flex'; gs.style.flexDirection = 'column';
    document.getElementById('pp-back').style.display = 'none';
    document.getElementById('pause-btn').style.display = 'flex';

    canvas = document.getElementById('canvas');
    ctx    = canvas.getContext('2d');
    area   = document.getElementById('game-area');

    highScore = parseInt(localStorage.getItem('pixelplay_snake_hs') || '0');
    resize();
    window.addEventListener('resize', resize);
    bindInput();
    initGame();
    requestAnimationFrame(gameLoop);
  }

  function resize() {
    const availW = window.innerWidth;
    const availH = window.innerHeight - 100; // top bar 48px + bottom bar 52px
    const s   = Math.min(availW, availH);
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = s * dpr;
    canvas.height = s * dpr;
    canvas.style.width  = s + 'px';
    canvas.style.height = s + 'px';
    W = H = s;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // reset + scale, avoids accumulation on resize
    cellSize = s / GRID;
  }

  function initGame() {
    score    = 0;
    gameOver = false;
    lastTick = 0;
    dir1 = nextDir1 = { x: 1, y: 0 };

    snake1 = [
      { x: 5, y: 10 }, { x: 4, y: 10 }, { x: 3, y: 10 }
    ];

    placeApple();
    updateBottomScore();
    document.getElementById('overlay').classList.remove('show');
  }

  function placeApple() {
    const all = [];
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        if (!snake1.some(s => s.x === x && s.y === y)) all.push({ x, y });
      }
    }
    apple = all[Math.random() * all.length | 0];
  }

  function changeDirection(dx, dy) {
    if (!(dx === -dir1.x && dy === -dir1.y)) nextDir1 = { x: dx, y: dy };
  }

  /* ── Input ── */
  function bindInput() {
    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': changeDirection(0, -1); break;
        case 'ArrowDown':  case 's': case 'S': changeDirection(0,  1); break;
        case 'ArrowLeft':  case 'a': case 'A': changeDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': changeDirection(1,  0); break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const now = Date.now();
      if (now - lastSwipeTime < SWIPE_COOLDOWN) return;

      const dx    = e.changedTouches[0].clientX - touchStartX;
      const dy    = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      if (Math.max(absDx, absDy) < SWIPE_THRESHOLD) return;

      lastSwipeTime = now;

      if (absDx > absDy) {
        changeDirection(dx > 0 ? 1 : -1, 0);
      } else {
        changeDirection(0, dy > 0 ? 1 : -1);
      }
    }, { passive: false });

    /* D-pad */
    if ('ontouchstart' in window) {
      document.getElementById('dpad').style.display = 'grid';
    }

    document.getElementById('btn-up').addEventListener('touchstart',
      e => { e.preventDefault(); changeDirection(0, -1); }, { passive: false });
    document.getElementById('btn-down').addEventListener('touchstart',
      e => { e.preventDefault(); changeDirection(0,  1); }, { passive: false });
    document.getElementById('btn-left').addEventListener('touchstart',
      e => { e.preventDefault(); changeDirection(-1, 0); }, { passive: false });
    document.getElementById('btn-right').addEventListener('touchstart',
      e => { e.preventDefault(); changeDirection(1,  0); }, { passive: false });

    document.getElementById('btn-up').addEventListener('click',    () => changeDirection(0, -1));
    document.getElementById('btn-down').addEventListener('click',   () => changeDirection(0,  1));
    document.getElementById('btn-left').addEventListener('click',   () => changeDirection(-1, 0));
    document.getElementById('btn-right').addEventListener('click',  () => changeDirection(1,  0));
  }

  /* ── Game Loop ── */
  function gameLoop(ts) {
    raf = requestAnimationFrame(gameLoop);
    if (!gameOver && !isPaused && ts - lastTick >= SPEED_MAP[diff]) {
      lastTick = ts;
      tick();
    }
    draw();
  }

  function tick() {
    dir1 = nextDir1;

    const head1 = { x: snake1[0].x + dir1.x, y: snake1[0].y + dir1.y };

    if (isWall(head1) || hitsSelf(head1, snake1)) {
      endGame(); return;
    }

    const ate1 = head1.x === apple.x && head1.y === apple.y;
    snake1.unshift(head1);
    if (!ate1) snake1.pop();

    if (ate1) {
      score += 10;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('pixelplay_snake_hs', highScore);
      }
      placeApple();
    }

    updateBottomScore();
  }

  function isWall(h)      { return h.x < 0 || h.x >= GRID || h.y < 0 || h.y >= GRID; }
  function hitsSelf(h, s) { return s.some((seg, i) => i > 0 && seg.x === h.x && seg.y === h.y); }

  let isPaused = false;
  function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
    document.getElementById('pause-btn').style.display = isPaused ? 'none' : 'flex';
    const dpad = document.getElementById('dpad');
    if (dpad) dpad.style.visibility = isPaused ? 'hidden' : 'visible';
    if (!isPaused) lastTick = performance.now();
  }
  function goToTitleScreen() {
    isPaused = false;
    cancelAnimationFrame(raf);
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('pause-btn').style.display = 'none';
    document.getElementById('pp-back').style.display = 'flex';
    if ('ontouchstart' in window) document.getElementById('dpad').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const btn = document.getElementById('pause-btn');
      if (btn && (btn.style.display === 'flex' || isPaused)) togglePause();
    }
  });
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('pause-btn').addEventListener('click', togglePause);
    document.getElementById('pause-resume-btn').addEventListener('click', togglePause);
    document.getElementById('pause-restart-btn').addEventListener('click', function() {
      isPaused = false;
      document.getElementById('pause-overlay').style.display = 'none';
      document.getElementById('pause-btn').style.display = 'flex';
      initGame();
    });
    document.getElementById('pause-title-btn').addEventListener('click', goToTitleScreen);
  });

  function endGame() {
    gameOver = true;
    document.getElementById('ov-emoji').textContent = '💀';
    document.getElementById('ov-title').textContent = 'Game Over!';
    document.getElementById('ov-score').innerHTML = `Score: ${score}<br>Best: ${highScore}`;
    document.getElementById('overlay').classList.add('show');
  }

  function updateBottomScore() {
    document.getElementById('bottom-score').textContent = `Score: ${score}  Best: ${highScore}`;
  }

  /* ── Draw ── */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    /* Background */
    ctx.fillStyle = '#0f1f2e';
    ctx.fillRect(0, 0, W, H);

    /* Grid lines */
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(W, i * cellSize); ctx.stroke();
    }

    /* Apple */
    if (apple) {
      const ax = apple.x * cellSize + cellSize / 2;
      const ay = apple.y * cellSize + cellSize / 2;
      const ar = cellSize * 0.38;

      // Glow
      const grd = ctx.createRadialGradient(ax, ay, 0, ax, ay, ar * 2);
      grd.addColorStop(0, 'rgba(232,64,64,0.25)');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(ax, ay, ar * 2, 0, Math.PI * 2); ctx.fill();

      // Body
      ctx.beginPath(); ctx.arc(ax, ay, ar, 0, Math.PI * 2);
      ctx.fillStyle = '#E84040'; ctx.fill();

      // Shine
      ctx.beginPath(); ctx.arc(ax - ar * 0.3, ay - ar * 0.3, ar * 0.28, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();

      // Stem
      ctx.beginPath();
      ctx.moveTo(ax, ay - ar);
      ctx.quadraticCurveTo(ax + ar * 0.5, ay - ar * 1.4, ax + ar * 0.3, ay - ar * 1.7);
      ctx.strokeStyle = '#3DC46A'; ctx.lineWidth = 1.5; ctx.stroke();
    }

    /* Draw snake */
    drawSnake(snake1, '#3DE070', '#2FC25E', '#57F08A');
  }

  function drawSnake(segs, colA, colB, headCol) {
    const r = cellSize * 0.42;
    segs.forEach((seg, i) => {
      const x  = seg.x * cellSize;
      const y  = seg.y * cellSize;
      const cx = x + cellSize / 2;
      const cy = y + cellSize / 2;

      if (i === 0) {
        // Head
        ctx.beginPath();
        ctx.roundRect(x + 1, y + 1, cellSize - 2, cellSize - 2, r);
        ctx.fillStyle = headCol;
        ctx.shadowBlur = 8; ctx.shadowColor = headCol + '88';
        ctx.fill();
        ctx.shadowBlur = 0;

        // Eyes
        const eyeR = cellSize * 0.1;
        const d  = segs[0];
        const nd = segs[1] || { x: d.x, y: d.y + 1 };
        const fx = (d.x - nd.x);
        const fy = (d.y - nd.y);
        const perp = { x: -fy, y: fx };
        const ex = cx + fx * cellSize * 0.18;
        const ey = cy + fy * cellSize * 0.18;
        [1,-1].forEach(s => {
          const ex2 = ex + perp.x * s * cellSize * 0.16;
          const ey2 = ey + perp.y * s * cellSize * 0.16;
          ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
          ctx.fillStyle = '#fff'; ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + fx * eyeR * 0.4, ey2 + fy * eyeR * 0.4, eyeR * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = '#111'; ctx.fill();
        });
      } else {
        ctx.beginPath();
        ctx.roundRect(x + 1, y + 1, cellSize - 2, cellSize - 2, r * 0.7);
        ctx.fillStyle = i % 2 === 0 ? colA : colB;
        ctx.fill();

        // Highlight
        ctx.beginPath();
        ctx.rect(x + 2, y + 2, cellSize - 4, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fill();
      }
    });
  }
})();
</script>

<div id="pause-overlay" style="display:none;position:fixed;inset:0;background:rgba(5,5,15,0.92);flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50000;">
  <div style="font-family:'Lilita One',Arial,sans-serif;font-size:34px;color:#00d4ff;letter-spacing:4px;text-shadow:0 0 20px rgba(0,212,255,0.6);">PAUSED</div>
  <button id="pause-resume-btn" style="font-family:'Lilita One',Arial,sans-serif;font-size:17px;padding:13px 0;width:220px;background:#3DC46A;color:#1D284A;border:3px solid #1D284A;border-radius:14px;box-shadow:3px 3px 0 #1D284A;cursor:pointer;-webkit-tap-highlight-color:transparent;box-sizing:border-box;">▶ RESUME</button>
