<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Ball Pool — PixelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #1e293b;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    touch-action: none;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#game-container {
    position: relative;
    height: 88vh;
    max-height: 900px;
    aspect-ratio: 1 / 2.15;
    max-width: calc(100vw - 80px);
    margin-right: 35px;
    display: flex;
    align-items: center;
}
#pool-canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
}
#power-container {
    position: absolute;
    right: -60px;
    top: 10%;
    height: 80%;
    width: 40px;
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 5px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
}
#power-fill {
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #ef4444, #f59e0b, #10b981);
    border-radius: 15px;
    transition: height 0.05s;
    pointer-events: none;
}
#power-knob {
    width: 140%;
    height: 24px;
    background: radial-gradient(circle at 50% 20%, #ffffff, #9ca3af);
    border-radius: 12px;
    position: absolute;
    bottom: 0;
    box-shadow: 0 4px 8px rgba(0,0,0,0.6);
    cursor: grab;
    border: 1px solid #e5e7eb;
}
#ui-layer {
    position: absolute;
    top: calc(28px + env(safe-area-inset-top));
    text-align: center;
    width: 100%;
    pointer-events: none;
    display: none;
}
#ball-in-hand-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    border: 2px solid #fbbf24;
    color: #fbbf24;
    padding: 15px 25px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 1.1rem;
    text-align: center;
    pointer-events: none;
    z-index: 40;
    transition: opacity 0.3s ease-out;
    white-space: nowrap;
    display: none;
}
#message-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 60;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
}
#message-overlay.visible { display: flex; }
#message-box {
    background: #1e293b;
    padding: 2rem;
    border-radius: 1rem;
    text-align: center;
    border: 2px solid #F5C200;
    max-width: 320px;
    width: 90%;
}
#message-title {
    font-family: 'Lilita One', cursive;
    font-size: 2.5rem;
    color: #F5C200;
    margin-bottom: 0.5rem;
}
#message-subtitle {
    color: #9ca3af;
    font-size: 1rem;
    margin-bottom: 1.5rem;
}
#message-continue {
    font-family: 'Lilita One', cursive;
    background: #F5C200;
    color: #1D284A;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 0.5rem;
    font-size: 1.1rem;
    cursor: pointer;
    width: 100%;
}
@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}
#main-menu {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: #0b2218;
    background-image: repeating-linear-gradient(45deg, #0b2218 25%, #081a12 25%, #081a12 50%, #0b2218 50%, #0b2218 75%, #081a12 75%, #081a12 100%);
    background-size: 40px 40px;
    border-radius: 20px;
}
.menu-btn {
    font-family: 'Lilita One', cursive;
    padding: 0.75rem 2rem;
    border-radius: 0.5rem;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    min-width: 130px;
}
.btn-yellow { background: #F5C200; color: #1D284A; }
.btn-green  { background: #3DC46A; color: white; }
.btn-red    { background: #E84040; color: white; }
.btn-navy   { background: #2A3660; color: white; }
.hidden { display: none !important; }
#game-container.menu-mode {
    margin-right: 0 !important;
    max-width: 100vw !important;
    aspect-ratio: unset !important;
    width: 100% !important;
    height: 100% !important;
}
#game-container.menu-mode #power-container,
#game-container.menu-mode #pool-canvas {
    display: none !important;
}
#game-container.menu-mode #main-menu {
    border-radius: 0;
}
</style>
</head>
<body>

<!-- PixelPlay back button — visible on title screen only -->
<div id="pp-back" style="position:fixed; top:calc(14px + env(safe-area-inset-top)); left:16px; z-index:2147483647; display:block;">
  <a href="../../index.html" style="display:inline-flex; align-items:center; gap:6px; background:#2A3660; color:#fff; font-family:'Lilita One',cursive; font-size:15px; padding:8px 14px; border-radius:999px; text-decoration:none;">← PixelPlay</a>
</div>

<!-- Pause button — visible during gameplay only -->
<button id="pause-btn" onclick="togglePause()" style="display:none; position:fixed; top:calc(14px + env(safe-area-inset-top)); right:16px; z-index:2147483647; width:44px; height:44px; border-radius:50%; background:#2A3660; border:none; cursor:pointer; color:white; font-size:20px;">⏸</button>

<!-- Pause overlay -->
<div id="pause-overlay" style="display:none; position:fixed; inset:0; z-index:2147483646; background:rgba(0,0,0,0.75); justify-content:center; align-items:center;">
  <div style="background:#1D284A; border-radius:16px; padding:32px 24px; display:flex; flex-direction:column; gap:12px; align-items:center;">
    <div style="font-family:'Lilita One',cursive; color:#F5C200; font-size:1.5rem; margin-bottom:8px;">PAUSED</div>
    <button onclick="resumeGame()" class="menu-btn btn-green" style="width:220px;">Resume</button>
    <button onclick="restartGame()" class="menu-btn btn-navy" style="width:220px;">Restart</button>
    <button onclick="goToTitle()" class="menu-btn btn-navy" style="width:220px;">Title Screen</button>
    <a href="../../index.html" id="pause-back-link" class="menu-btn btn-navy" style="width:220px; text-align:center; text-decoration:none; display:block; padding:0.75rem 2rem;">← PixelPlay</a>
  </div>
</div>

<!-- Win/Loss modal -->
<div id="message-overlay">
  <div id="message-box">
    <div id="message-title"></div>
    <div id="message-subtitle"></div>
    <button id="message-continue" onclick="resetToMenu()">CONTINUE</button>
  </div>
</div>

<!-- Game container -->
<div id="game-container" class="menu-mode">

  <!-- Main Menu -->
  <div id="main-menu">
    <div style="display:flex; flex-direction:column; align-items:center; gap:16px; padding:24px; text-align:center;">
      <!-- Bouncing 8-ball -->
      <div style="width:80px; height:80px; background:#111827; border-radius:50%; display:flex; align-items:center; justify-content:center; animation:bounce 1.5s infinite ease-in-out; box-shadow:0 10px 15px rgba(0,0,0,0.8); position:relative; flex-shrink:0;">
        <div style="width:32px; height:32px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center;">
          <span style="color:black; font-weight:bold; font-size:1.2rem;">8</span>
        </div>
        <div style="position:absolute; top:8px; left:12px; width:16px; height:16px; background:white; border-radius:50%; opacity:0.3;"></div>
      </div>

      <h1 style="font-family:'Lilita One',cursive; font-size:2.2rem; color:#F5C200; text-shadow:0 4px 6px rgba(0,0,0,0.5);">8-BALL POOL</h1>
      <p style="color:#9ca3af; font-size:0.9rem;">Aim and slide the power bar to shoot</p>
      <p style="font-family:'Lilita One',cursive; color:#F5C200; font-size:1rem;">P1: <span id="p1-menu-score">0</span> | P2: <span id="p2-menu-score">0</span></p>

      <div id="primary-buttons" style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
        <button class="menu-btn btn-yellow" onclick="showDifficulty()">VS AI</button>
        <button class="menu-btn btn-yellow" onclick="startGame('pvp', null)">2 PLAYER</button>
      </div>

      <div id="difficulty-buttons" class="hidden" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="menu-btn btn-green" onclick="startGame('pve', 'easy')">EASY</button>
        <button class="menu-btn btn-yellow" onclick="startGame('pve', 'medium')">MEDIUM</button>
        <button class="menu-btn btn-red" onclick="startGame('pve', 'hard')">HARD</button>
      </div>
    </div>
  </div>

  <!-- In-game HUD -->
  <div id="ui-layer">
    <div id="turn-indicator" style="font-family:'Lilita One',cursive; font-size:1.2rem; color:#38bdf8; text-shadow:1px 1px 2px #000; text-transform:uppercase;">PLAYER 1'S TURN</div>
    <div id="match-status" style="font-size:0.85rem; color:#9ca3af; margin-top:6px; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px;">
      <span style="display:flex; align-items:center; gap:4px;">P1: <span id="p1-score-text">0</span> <span id="p1-color-dot" style="display:none; width:10px; height:10px; border-radius:50%;"></span></span>
      <span>|</span>
      <span style="display:flex; align-items:center; gap:4px;">P2: <span id="p2-score-text">0</span> <span id="p2-color-dot" style="display:none; width:10px; height:10px; border-radius:50%;"></span></span>
    </div>
  </div>

  <!-- Ball in hand banner -->
  <div id="ball-in-hand-banner">
    BALL IN HAND<br>
    <span style="font-size:0.8rem; color:#f3f4f6; font-weight:normal;">Drag the white ball to place it</span>
  </div>

  <canvas id="pool-canvas" width="400" height="860"></canvas>

  <div id="power-container">
    <div id="power-fill"></div>
    <div id="power-knob"></div>
  </div>

</div>

<script src="../../js/capacitor-nav.js"></script>
<script src="tone.min.js"></script>
<script src="game.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var navTarget = (window.Capacitor && window.Capacitor.isNativePlatform())
        ? '../../app.html' : '../../index.html';
    var ppBack = document.querySelector('#pp-back a');
    if (ppBack) {
        ppBack.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            window.location.href = navTarget;
        });
    }
    var pauseBack = document.getElementById('pause-back-link');
    if (pauseBack) {
        pauseBack.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            window.location.href = navTarget;
        });
    }
});
</script>
</body>
</html>
