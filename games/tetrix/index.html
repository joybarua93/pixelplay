<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetrix — PixelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
<style>
  #pp-back {
    position: fixed !important;
    top: 14px !important;
    left: 14px !important;
    z-index: 999999 !important;
    transform: translateZ(1px) !important;
    display: flex;
    align-items: center !important;
    gap: 6px !important;
    padding: 8px 16px 8px 12px !important;
    background: #2A3660 !important;
    color: #ffffff !important;
    font-family: 'Lilita One', Arial, sans-serif !important;
    font-size: 15px !important;
    text-decoration: none !important;
    border-radius: 50px !important;
    border: 2px solid rgba(255,255,255,0.25) !important;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4), 3px 3px 0 #1D284A !important;
    letter-spacing: 0.3px !important;
    -webkit-tap-highlight-color: transparent !important;
    pointer-events: all !important;
  }
  #pp-back::before { content: '←' !important; font-size: 16px !important; }
  #pp-back:hover  { background: #38AAEE !important; }
  #pp-back:active { transform: translate(2px,2px) !important; }
</style>
</head>
<body>

    <a id="pp-back" href="../../index.html">PixelPlay</a>

    <div id="info-bar" style="
        position:fixed;top:0;left:0;right:0;height:64px;
        background:#111827;border-bottom:2px solid #1D284A;
        display:none;align-items:center;justify-content:space-between;
        padding:0 16px 0 14px;z-index:100;">
        <div style="display:flex;flex-direction:column;gap:2px;">
            <div style="color:#00d4ff;font-family:'Lilita One',sans-serif;font-size:15px;letter-spacing:1px;">
                SCORE: <span id="score">0</span>
            </div>
            <div style="color:rgba(0,212,255,0.6);font-family:'Lilita One',sans-serif;font-size:12px;letter-spacing:1px;">
                LEVEL: <span id="level-display">1</span>
            </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <div style="color:rgba(255,255,255,0.4);font-family:'Lilita One',sans-serif;font-size:10px;letter-spacing:2px;">NEXT</div>
            <canvas id="next-canvas" width="48" height="48" style="image-rendering:pixelated;"></canvas>
        </div>
        <div style="width:40px;"></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="start-menu" class="menu-screen">
            <h1>
                <span class="tl-T">T</span><span class="tl-E">E</span><span class="tl-T2">T</span><span class="tl-R">R</span><span class="tl-I">I</span><span class="tl-X">X</span>
            </h1>
            <p>Stack. Clear. Survive.</p>
            <p class="best-display">BEST: <span id="title-best">0</span></p>
            <div class="btn-group">
                <button class="menu-btn easy" data-difficulty="easy">EASY</button>
                <button class="menu-btn medium" data-difficulty="medium">MEDIUM</button>
                <button class="menu-btn hard" data-difficulty="hard">HARD</button>
            </div>
        </div>

        <div id="game-over-screen" class="menu-screen hidden">
            <h1 class="gameover-title">GAME OVER</h1>
            <p class="score-line">SCORE: <span id="final-score">0</span></p>
            <p class="score-line best-line">BEST: <span id="best-score">0</span></p>
            <div class="btn-group" style="flex-direction:column;gap:10px;margin-top:12px;">
                <button id="restart-btn" class="pause-btn">PLAY AGAIN</button>
                <a class="pause-btn" href="../../index.html">← PIXELPLAY</a>
            </div>
        </div>
    </div>

    <div id="pause-overlay" style="display:none;position:fixed;inset:0;
        background:rgba(13,22,34,0.88);flex-direction:column;
        align-items:center;justify-content:center;gap:16px;z-index:500;">
        <div class="pause-title" style="color:#8B5CF6;">PAUSED</div>
        <button class="pause-btn" onclick="togglePause()">RESUME</button>
        <button class="pause-btn" onclick="restartGame()">RESTART</button>
        <button class="pause-btn" onclick="goToTitleScreen()">☰ TITLE SCREEN</button>
        <a href="../../index.html" style="font-family:'Lilita One',Arial,sans-serif;font-size:17px;background:#2A3660;color:#ffffff;border:3px solid #1D284A;border-radius:14px;padding:13px 0;width:220px;cursor:pointer;box-shadow:3px 3px 0 #1D284A;-webkit-tap-highlight-color:transparent;display:block;text-decoration:none;text-align:center;box-sizing:border-box;">← PixelPlay</a>
    </div>

    <button id="pause-btn" style="
        position:fixed;top:14px;right:14px;z-index:2147483647;
        width:40px;height:40px;background:rgba(42,54,96,0.85);color:#fff;
        font-size:18px;border:2px solid rgba(255,255,255,0.25);border-radius:50%;
        cursor:pointer;display:none;align-items:center;justify-content:center;
        box-shadow:0 2px 8px rgba(0,0,0,0.4);-webkit-tap-highlight-color:transparent;
        touch-action:manipulation;">⏸</button>

    <script src="game.js"></script>
<script src="../../js/capacitor-nav.js"></script>
</body>
</html>
